version: 1
template: linux
checks:
  - source_id: "0"
    id: "LNX-KERNEL-001"
    name: "系统内核信息"
    category: "system"
    description: "采集当前 Linux 内核与主机版本信息。"
    expected: "系统内核版本符合组织支持基线。"
    severity: "info"
    recommendation: "核对内核版本是否在受支持范围内。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "1"
    id: "LNX-ACC-001"
    name: "本地账户信息"
    category: "account"
    description: "采集 /etc/passwd 内容。"
    expected: "至少存在 1 个本地账户。"
    severity: "low"
    recommendation: "核查异常账户、空口令账户和高权限账户。"
    evaluator:
      kind: int_gte
      field: account_count
      min: 1
  - source_id: "2"
    id: "LNX-GRP-001"
    name: "本地用户组信息"
    category: "account"
    description: "采集 /etc/group 内容。"
    expected: "至少存在 1 个本地用户组。"
    severity: "low"
    recommendation: "核查 wheel、root 等高权限组成员。"
    evaluator:
      kind: int_gte
      field: group_count
      min: 1
  - source_id: "3"
    id: "LNX-SHADOW-001"
    name: "口令影子文件信息"
    category: "account"
    description: "采集 /etc/shadow 内容摘要。"
    expected: "弱口令或空口令标记数量为 0。"
    severity: "info"
    recommendation: "核查弱口令、空口令及异常口令策略。"
    evaluator:
      kind: int_equals
      field: empty_password_count
      value: "0"
  - source_id: "4"
    id: "LNX-FILE-001"
    name: "关键账户文件属性"
    category: "filesystem"
    description: "采集 /etc/shadow、/etc/passwd 等文件属性。"
    expected: "至少 2 个关键认证文件处于受保护状态。"
    severity: "medium"
    recommendation: "核查关键认证文件权限与属性是否安全。"
    evaluator:
      kind: int_gte
      field: protected_file_count
      min: 2
  - source_id: "5"
    id: "LNX-TERM-001"
    name: "安全终端配置"
    category: "system"
    description: "采集 /etc/securetty 配置。"
    expected: "root 登录终端范围受控。"
    severity: "medium"
    recommendation: "限制 root 可直接登录的终端范围。"
    evaluator:
      kind: bool_true
      field: pts_rule_absent
  - source_id: "6"
    id: "LNX-SVC-001"
    name: "系统服务信息"
    category: "service"
    description: "采集 chkconfig 服务启用状态。"
    expected: "系统服务信息可读取。"
    severity: "medium"
    recommendation: "核查不必要服务和高风险远程服务。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "7"
    id: "LNX-NET-001"
    name: "网络接口信息"
    category: "network"
    description: "采集 ifconfig 输出。"
    expected: "活动网络接口信息可读取。"
    severity: "medium"
    recommendation: "核查异常网卡、虚拟网卡和多余地址。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "8"
    id: "LNX-LOGIN-001"
    name: "登录日志信息"
    category: "audit"
    description: "采集最近登录记录。"
    expected: "最近登录记录可读取。"
    severity: "medium"
    recommendation: "核查异常登录时段与来源。"
    evaluator:
      kind: int_gte
      field: entry_count
      min: 1
  - source_id: "9"
    id: "LNX-LOG-001"
    name: "日志服务配置"
    category: "audit"
    description: "采集 syslog/rsyslog 配置。"
    expected: "日志服务配置已启用。"
    severity: "medium"
    recommendation: "核查日志接收、转发与保留配置。"
    evaluator:
      kind: int_gt
      field: log_target_count
      min: 0
  - source_id: "10"
    id: "LNX-FS-001"
    name: "磁盘使用信息"
    category: "filesystem"
    description: "采集磁盘使用情况。"
    expected: "最高磁盘使用率不高于 90%。"
    severity: "medium"
    recommendation: "核查关键挂载点容量和异常分区。"
    evaluator:
      kind: int_lte
      field: highest_used_percent
      max: 90
  - source_id: "11"
    id: "LNX-LOGIN-002"
    name: "登录失败日志"
    category: "audit"
    description: "采集最近失败登录记录。"
    expected: "失败登录记录可读取。"
    severity: "medium"
    recommendation: "核查暴力破解和异常来源。"
    evaluator:
      kind: int_gte
      field: entry_count
      min: 1
  - source_id: "12"
    id: "LNX-LOG-002"
    name: "系统日志摘要"
    category: "audit"
    description: "采集系统日志摘要。"
    expected: "系统日志摘要可读取。"
    severity: "medium"
    recommendation: "核查异常报错和安全事件线索。"
    evaluator:
      kind: int_gte
      field: log_line_count
      min: 1
  - source_id: "13"
    id: "LNX-META-001"
    name: "临时工件清理"
    category: "meta"
    description: "记录 benchmark 临时工件清理状态。"
    expected: "临时工件已安全清理。"
    severity: "low"
    recommendation: "确认扫描过程未残留敏感中间文件。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "14"
    id: "LNX-NET-002"
    name: "网络连接信息"
    category: "network"
    description: "采集网络连接与监听端口信息。"
    expected: "网络连接信息可读取。"
    severity: "medium"
    recommendation: "核查异常监听端口与外联连接。"
    evaluator:
      kind: int_gte
      field: listen_count
      min: 1
  - source_id: "15"
    id: "LNX-PROC-001"
    name: "进程信息"
    category: "process"
    description: "采集当前进程列表。"
    expected: "进程信息可读取。"
    severity: "medium"
    recommendation: "核查异常进程和来源不明进程。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "16"
    id: "LNX-FTP-001"
    name: "FTP Banner 配置"
    category: "service"
    description: "采集 FTP Banner 配置。"
    expected: "FTP Banner 不泄露敏感系统信息。"
    severity: "medium"
    recommendation: "避免在 FTP Banner 中泄露版本和系统信息。"
    evaluator:
      kind: bool_true
      field: banner_configured
  - source_id: "17"
    id: "LNX-FTP-002"
    name: "FTP chroot 用户配置"
    category: "service"
    description: "采集 FTP chroot 用户列表。"
    expected: "FTP 用户隔离列表已配置。"
    severity: "medium"
    recommendation: "为 FTP 用户启用隔离目录或核查例外用户。"
    evaluator:
      kind: int_gt
      field: entry_count
      min: 0
  - source_id: "19"
    id: "LNX-FTP-004"
    name: "FTP Banner 文件内容"
    category: "service"
    description: "采集 FTP Banner 文件内容。"
    expected: "FTP Banner 文件内容已配置。"
    severity: "medium"
    recommendation: "核查对外提示内容是否泄露内部信息。"
    evaluator:
      kind: bool_true
      field: banner_content_present
  - source_id: "20"
    id: "LNX-FTP-003"
    name: "FTP 访问控制配置"
    category: "service"
    description: "采集 ftpaccess 配置。"
    expected: "FTP 访问控制配置已存在。"
    severity: "medium"
    recommendation: "核查 FTP 访问控制、来源限制和匿名设置。"
    evaluator:
      kind: int_gt
      field: rule_count
      min: 0
  - source_id: "21"
    id: "LNX-RPM-001"
    name: "已安装 RPM 软件包"
    category: "software"
    description: "采集 RPM 软件包列表摘要。"
    expected: "已安装 RPM 软件包信息可读取。"
    severity: "medium"
    recommendation: "核查异常软件包和不必要组件。"
    evaluator:
      kind: bool_true
      field: present
  - source_id: "22"
    id: "LNX-REL-001"
    name: "发行版版本信息"
    category: "system"
    description: "采集 Linux 发行版版本信息。"
    expected: "发行版版本信息可识别。"
    severity: "medium"
    recommendation: "核查发行版版本与补丁支持周期。"
    evaluator:
      kind: bool_true
      field: present
